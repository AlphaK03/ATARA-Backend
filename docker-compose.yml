services:
  postgres:
    image: postgres:17
    container_name: atara-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: atara_db
      POSTGRES_USER: atara_user
      # Valor tomado de la variable de entorno PGPASSWORD.
      # En desarrollo local definirla en un archivo .env en la raíz del proyecto (gitignoreado).
      POSTGRES_PASSWORD: ${PGPASSWORD:-atara_pass_123}
    ports:
      - "5433:5432"
    volumes:
      - atara_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atara_user -d atara_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  atara_postgres_data: