services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  # Se levanta siempre: tanto en desarrollo local como en producción.
  postgres:
    image: postgres:17
    container_name: atara-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: atara_db
      POSTGRES_USER: atara_user
      POSTGRES_PASSWORD: ${PGPASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - atara_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atara_user -d atara_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Spring Boot ────────────────────────────────────────────────────
  # Solo se levanta en producción: docker-compose --profile prod up -d
  # En desarrollo local usar: ./mvnw spring-boot:run
  backend:
    profiles: [prod]
    build: .
    container_name: atara-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # Base de datos — apunta al servicio postgres de esta red interna
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: atara_db
      PGUSER: atara_user
      PGPASSWORD: ${PGPASSWORD}
      # Correo
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      # Seguridad
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      # Frontend
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      # OCR — ruta dentro del contenedor donde se copió spa.traineddata
      PIAD_TESSDATA_DIR: /usr/share/tessdata
    ports:
      - "${PORT:-8081}:8081"

volumes:
  atara_postgres_data:
