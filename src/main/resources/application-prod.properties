# =============================================================================
# Perfil de PRODUCCIÓN — endurecimiento de despliegue (hallazgo B-10)
# =============================================================================
# Solo sobre-escribe lo que debe endurecerse en producción; application.properties
# sigue siendo la base amigable para desarrollo local. Arrancar con:
#     SPRING_PROFILES_ACTIVE=prod
#
# Este archivo NO contiene ningún secreto: todos se exigen por variable de entorno
# SIN valor por defecto, de modo que la app NO ARRANCA si falta alguno. Es el
# comportamiento deseado en producción (fail-fast): obliga a configurarlos.
#
# Variables de entorno REQUERIDAS en producción:
#   - JWT_SECRET           clave aleatoria >= 32 bytes (sin ella no se firman tokens)
#   - CORS_ALLOWED_ORIGINS dominio(s) real(es) del frontend, separados por coma
#   - PGPASSWORD           contraseña fuerte de la BD de producción
#   - MAIL_PASSWORD        App Password de Gmail (rotado; el expuesto debe revocarse)
#
# Nota: HSTS y la CSP del frontend se configuran en el reverse-proxy / host del
# frontend, no en esta API REST (devuelve JSON, no sirve el HTML/JS).

# No registrar SQL (evita volcar PII de menores en los logs).
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# CORS sin default '*': debe fijarse al/los dominio(s) real(es) del frontend.
cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGINS}

# Secretos obligatorios por entorno (sin default → la app falla al arrancar si faltan).
jwt.secret=${JWT_SECRET}
spring.datasource.password=${PGPASSWORD}
spring.mail.password=${MAIL_PASSWORD}
