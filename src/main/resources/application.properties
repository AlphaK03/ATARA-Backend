spring.application.name=atara-api

spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5433}/${PGDATABASE:atara_db}
spring.datasource.username=${PGUSER:atara_user}
spring.datasource.password=${PGPASSWORD:atara_pass_123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.encoding=UTF-8
spring.flyway.schemas=public

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SHOW_SQL:true}

# CORS — en producción establecer CORS_ALLOWED_ORIGINS al dominio real del frontend
cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGINS:*}

server.port=${PORT:8081}

# JWT
jwt.secret=${JWT_SECRET:atara-jwt-clave-secreta-muy-segura-para-desarrollo-local-2024-x}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:7}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.server.port=${PORT:8081}

# Extractor PIAD — ruta a la carpeta que contiene spa.traineddata
piad.tessdata.dir=scripts/extractor-piad/tessdata

# ─── Envío de correo (verificación + reset password) ────────────────────────
# Gmail SMTP con App Password. Si SPRING_MAIL_USERNAME está vacío, EmailServiceImpl
# loguea el correo en consola en vez de enviarlo (útil en dev local sin SMTP).
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Nombre y correo "From" que verán los destinatarios
app.mail.from-name=${MAIL_FROM_NAME:ATARA - Sistema de Alerta Temprana}
app.mail.from-address=${MAIL_FROM_ADDRESS:no-reply@atara.mep.go.cr}

# Base del frontend para armar links de verificación y reset
# Producción: setear FRONTEND_BASE_URL al dominio Vercel
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173}

# Vencimientos
app.tokens.verificacion-horas=24
app.tokens.reset-minutos=15

