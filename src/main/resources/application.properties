spring.application.name=atara-api
# Última actualización: 2026-06-07

# Perfil activo: "local" por defecto carga application-local.properties (gitignoreado)
# con los secretos de desarrollo. En producción definir SPRING_PROFILES_ACTIVE=prod
# (o cualquier valor distinto de "local") para que ese archivo no se cargue.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5433}/${PGDATABASE:atara_db}
spring.datasource.username=${PGUSER:atara_user}
# Sin valor por defecto: debe definirse PGPASSWORD por variable de entorno.
# En desarrollo local se sobreescribe en application-local.properties (ver .example).
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.encoding=UTF-8
spring.flyway.schemas=public

spring.jpa.hibernate.ddl-auto=none
# Desactivado por defecto: con show-sql=true Hibernate registra las consultas con sus
# parámetros (PII de menores) en los logs. Habilitar solo en desarrollo con SHOW_SQL=true.
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SHOW_SQL:false}

# CORS — en producción DEBE definirse CORS_ALLOWED_ORIGINS al dominio exacto del
# frontend (ej. https://atara.una.ac.cr). El wildcard "*" es solo aceptable en
# desarrollo local; en producción expone la API a cualquier origen.
cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGINS:*}

server.port=${PORT:8081}

# JWT
# Sin valor por defecto: en producción DEBE definirse JWT_SECRET (>=32 bytes) por
# variable de entorno. Si está vacío/corto, JwtService genera una clave aleatoria
# EFÍMERA solo para desarrollo local (los tokens no sobreviven reinicios). El valor
# de desarrollo que estuvo versionado quedó comprometido y se rechaza al arrancar.
jwt.secret=${JWT_SECRET:}
# Access token de vida corta (30 min). Como no hay revocación de access tokens,
# una vida larga amplía la ventana ante un token robado o tras un logout. El
# frontend renueva de forma transparente con el refresh token (refresh-on-401).
jwt.expiration-ms=${JWT_EXPIRATION_MS:1800000}
jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:7}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.server.port=${PORT:8081}

# Respuestas de error: nunca exponer stacktrace ni datos internos al cliente
# (regla de seguridad del proyecto). Desde que /error es alcanzable para errores
# de requests autenticados (404/405/500), Spring devolvería el trace por defecto.
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.include-message=always

# Brevo — API HTTP para envío de correos (reemplaza SMTP, no se bloquea en cloud).
# BREVO_API_KEY: API key del panel de Brevo (Configuración → Claves API).
# BREVO_FROM_EMAIL: correo remitente verificado en Brevo (Remitentes → Verificar correo).
brevo.api-key=${BREVO_API_KEY}
brevo.from-email=${BREVO_FROM_EMAIL:ataranotificaciones@gmail.com}
brevo.from-name=${BREVO_FROM_NAME:ATARA — Notificaciones}

# URL base del frontend (para enlaces en correos)
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# Extractor PIAD — ruta a la carpeta que contiene spa.traineddata
piad.tessdata.dir=${PIAD_TESSDATA_DIR:scripts/extractor-piad/tessdata}

# Diagnóstico de autenticación JWT — descomentar (o exponer via LOG_LEVEL_SECURITY)
# para registrar por qué un request queda sin autenticar: sin header Bearer,
# token expirado, firma inválida/malformado, o subject no coincidente. No expone
# el token ni PII. Útil para depurar 401 intermitentes (p. ej. POST /api/piad/extraer).
logging.level.com.atara.deb.ataraapi.security=${LOG_LEVEL_SECURITY:INFO}

# Límites de subida multipart — necesarios para el PDF de Lista PIAD.
# El default de Spring (1MB por archivo) puede rechazar listas grandes.
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:25MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:30MB}

